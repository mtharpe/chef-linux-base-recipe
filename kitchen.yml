---
driver:
  name: vagrant
  customize:
    memory: 2048
  gui: false

provisioner:
  sudo: true
  name: chef_zero
  product_name: chef
  product_version: latest
  chef_license: accept
  install_strategy: always
  always_update_cookbooks: true

verifier:
  name: inspec

platforms:
  - name: bento/ubuntu-22.04
  - name: bento/ubuntu-24.04
  - name: bento/rockylinux-8
  - name: bento/rockylinux-9
  - name: bento/almalinux-9

suites:
  - name: default
    verifier:
      inspec_tests:
        - test/integration/default
    attributes:
